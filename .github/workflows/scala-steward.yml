name: scala-steward
on:
  push:
    branches: [ master ]
  schedule:
  - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.repository_owner == 'json4s' }}
    steps:
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89664
        private-key: ${{ secrets.JSON4S_BOT_KEY }}
    - name: Launch Scala Steward
      uses: scala-steward-org/scala-steward-action@708c1d682b14b9785201afb25c8ffece0a9d126f # v2.90.0
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        author-email: "74845451+json4s-bot[bot]@users.noreply.github.com"
        author-name: json4s-bot[bot]
        branches: "master,4.0,4.1"
      env:
        JAVA_OPTS: "-Xmx4G"
